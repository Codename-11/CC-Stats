name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG"

      - name: Restore
        run: dotnet restore windows/CCStats.Windows.sln

      - name: Publish (self-contained, single file)
        run: |
          dotnet publish windows/CCStats.Desktop/CCStats.Desktop.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 `
            -p:FileVersion=${{ steps.version.outputs.version }}.0 `
            --output ./release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/CCStats.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts

      - name: Rename artifact
        run: mv artifacts/CCStats.exe artifacts/CCStats-${{ github.ref_name }}-win-x64.exe

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "## Changes since $PREV_TAG" > generated-notes.md
          echo "" >> generated-notes.md
          git log --pretty=format:"- %s" "$PREV_TAG".."${{ github.ref_name }}" -- windows/ .github/ README.md CHANGELOG.md TODO.md >> generated-notes.md
          echo "" >> generated-notes.md
          echo "" >> generated-notes.md
          echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}" >> generated-notes.md

      - name: Check for manual release notes
        id: release_notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: false
          make_latest: true
          body_path: ${{ steps.release_notes.outputs.has_notes == 'true' && 'RELEASE_NOTES.md' || 'generated-notes.md' }}
